{% extends "base.html" %}
{% block content %}
<h1 class="text-xl font-bold mb-4">Upcoming</h1>
{% if upcoming %}
  {% for a in upcoming %}
  <div class="bg-white p-3 rounded shadow mb-2">
    {{ a.service }} - {{ a.date.strftime('%Y-%m-%d') }}
  </div>
  {% endfor %}
{% else %}
  <div class="bg-white p-3 rounded shadow mb-2 text-gray-500">No upcoming appointments yet.</div>
{% endif %}
{% endblock %}
